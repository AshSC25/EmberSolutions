<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unreal Coffee</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--nav-->
  <nav>
    <h1 class="logo">Unreal Coffee</h1>
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#order">Order</a></li>
    </ul>
  </nav>

  <!--intro-->
  <section id="intro">
    <h2>Crafted with care,<br>ready when you are.</h2>
    <a href="#order">Order Now</a>
  </section>

  <!--order form-->
  <section id="order">
    <h2>Place Your Order</h2>
    <form id="orderForm">
      <input type="text" id="name" placeholder="Your name" required>
      <div id="drinkOptions">
        <p>Select your drinks:</p>
        <label><input type="checkbox" class="drinkCheck" value="Latte" data-price="5.50"> Latte - $5.50</label>
        <label><input type="checkbox" class="drinkCheck" value="Cappuccino" data-price="5.00"> Cappuccino - $5.00</label>
        <label><input type="checkbox" class="drinkCheck" value="Cold Brew" data-price="4.50"> Cold Brew - $4.50</label>
        <label><input type="checkbox" class="drinkCheck" value="Matcha Latte" data-price="6.00"> Matcha Latte - $6.00</label>
      </div>
      <p>Live Total: <strong id="liveTotal">$0.00</strong></p>
      <select id="size" required>
        <option value="">Select a size</option>
        <option value="Small" data-extra="0">Small</option>
        <option value="Medium" data-extra="0.50">Medium (+$0.50)</option>
        <option value="Large" data-extra="1.00">Large (+$1.00)</option>
      </select>
      <button type="button" id="addItem">Add to Order</button>
    </form>

    <!-- Running order list -->
    <div id="orderList" style="display:none;">
      <h3>Your Order:</h3>
      <ul id="itemList"></ul>
      <p>Total: <strong id="runningTotal">$0.00</strong></p>
      <button type="button" id="placeOrder">Place Order</button>
    </div>
  </section>

  <!--receipt-->
  <section id="receipt" style="display:none;">
    <h2>Thanks, <span id="customerName"></span>!</h2>
    <div id="receiptItems"></div>
    <p>Total: <strong id="orderPrice"></strong></p>
    <p>Your order will be ready at <strong><span id="pickupTime"></span></strong>.</p>
    <p>A receipt has been sent to the counter.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
